name: michelet-app
services:
  eureka-server:
    build:
      context: ../eureka-server
    container_name: eureka-server
    environment:
      SPRING_PROFILES_ACTIVE: docker
    command:
      - "--server.port=8761"
      - "--eureka.instance.hostname=eureka-server"
      - "--eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/"
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - michelet-network

  user-service:
    build:
      context: ../user-service
    container_name: user-service
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
    command:
      - "--eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/"
    ports:
      - "19100:19100"
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - michelet-network

  restaurant-service:
    build:
      context: ../restaurant-service
    container_name: restaurant-service
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 19300

      DB_URL: jdbc:postgresql://db:5432/michelet_db
      DB_USERNAME: admin
      DB_PASSWORD: admin

      EUREKA_CLIENT_ENABLED: "true"
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: restaurant-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"

      FEIGN_RESERVATION_SERVICE_URL: http://reservation-service:19500

      # 조회 API 부하테스트 중에는 체크인 Kafka Consumer 영향을 배제하기 위해 Listener 비활성화
      SPRING_KAFKA_LISTENER_AUTO_STARTUP: "false"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

      INTERNAL_AUTH_SECRET: michelet-internal-auth-secret-key-a8K2mQ9xLp4Vt7Rz1Nc
      JWT_SECRET: michelet-secret-key-for-authentication-a8K2mQ9xLp4Vt7Rz1Nc
    command:
      - "--eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/"
      - "--eureka.instance.hostname=restaurant-service"
      - "--eureka.instance.prefer-ip-address=false"
    ports:
      - "19300:19300"
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - michelet-network
