name: michelet-monitoring

services:
  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "--tries=1", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 512m
    networks:
      - michelet-network

  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "--tries=1", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 256m
    networks:
      - michelet-network

volumes:
  prometheus-data:
  grafana-data:

networks:
  michelet-network:
    external: true