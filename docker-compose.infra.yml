name: michelet-infra

services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:18}
    container_name: ${POSTGRES_CONTAINER_NAME:-db}
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-michelet_db}
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - db-data:/var/lib/postgresql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-michelet_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - michelet-network

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: ${REDIS_CONTAINER_NAME:-redis}
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - michelet-network

  mongo-db:
    image: ${MONGO_IMAGE:-mongo:8}
    container_name: ${MONGO_CONTAINER_NAME:-mongo-db}
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - michelet-network

volumes:
  db-data:
    name: ${POSTGRES_VOLUME_NAME:-db-data}
  redis-data:
    name: ${REDIS_VOLUME_NAME:-redis-data}
  mongo-data:
    name: ${MONGO_VOLUME_NAME:-mongo-data}


networks:
  michelet-network:
    name: michelet-network